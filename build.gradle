import java.util.concurrent.TimeUnit

static String envOr(String key, String presentPrefix = "", Object or = "") {
    def env = System.getenv()
    if (env.containsKey(key))
        return presentPrefix + env.get(key)
    return or
}

allprojects {
    apply plugin: 'java-library'
    group 'org.comroid'

    sourceCompatibility = 17
    targetCompatibility = 17

    apply from: "${rootDir.absolutePath}/gradle/vars.gradle"
    ext { buildId = TimeUnit.MILLISECONDS.toMinutes(System.currentTimeMillis()) }

    sourceSets {
        main.java.srcDirs       = files("${rootDir.absolutePath}/src/${project.name}/main/java")
        main.resources.srcDirs  = files("${rootDir.absolutePath}/src/${project.name}/main/resources")
        test.java.srcDirs       = files("${rootDir.absolutePath}/src/${project.name}/test/java")
        test.resources.srcDirs  = files("${rootDir.absolutePath}/src/${project.name}/test/resources")
    }

    repositories {
        mavenLocal()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        mavenCentral()
    }

    dependencies {
        // lombok
        compileOnly 'org.projectlombok:lombok:+'
        annotationProcessor 'org.projectlombok:lombok:+'

        // test dependencies
        testImplementation 'junit:junit:+'
        testImplementation 'org.easymock:easymock:+'
        testCompileOnly 'org.projectlombok:lombok:+'
        testAnnotationProcessor 'org.projectlombok:lombok:+'
    }
}

subprojects {
    dependencies {
        // lombok
        compileOnly 'org.projectlombok:lombok:+'
        annotationProcessor 'org.projectlombok:lombok:+'

        // test dependencies
